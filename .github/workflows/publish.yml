name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!LICENSE'
      - '!.gitignore'

  workflow_dispatch:
    inputs:
      level:
        description: 'Release level (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-package
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install aux4
        run: |
          curl -fsSL https://aux4.sh | sh
          echo "$HOME/.aux4.config/packages/aux4/aux4" >> $GITHUB_PATH

      - name: Install pkger
        run: curl -fsSL https://pkger.aux4.sh | sh

      - name: Install test package
        run: aux4 aux4 pkger install aux4/test

      - name: Install package
        working-directory: package
        run: |
          aux4 aux4 pkger build .
          PACKAGE_FILE=$(ls *.zip)
          aux4 aux4 pkger install --fromFile "$PACKAGE_FILE"

      - name: Run tests
        working-directory: package
        run: |
          aux4 test run test/learn.test.md
          aux4 test run test/rag.test.md

  test-darwin:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install aux4
        run: |
          curl -fsSL https://aux4.sh | sh
          echo "$HOME/.aux4.config/packages/aux4/aux4" >> $GITHUB_PATH

      - name: Install pkger
        run: curl -fsSL https://pkger.aux4.sh | sh

      - name: Install test package
        run: aux4 aux4 pkger install aux4/test

      - name: Install package
        working-directory: package
        run: |
          aux4 aux4 pkger build .
          PACKAGE_FILE=$(ls *.zip)
          aux4 aux4 pkger install --fromFile "$PACKAGE_FILE"

      - name: Run tests
        working-directory: package
        run: |
          aux4 test run test/learn.test.md
          aux4 test run test/rag.test.md

  publish:
    needs: [test-linux, test-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Clean build artifacts
        run: git checkout .

      - name: Publish package
        uses: aux4/publish-package-action@v1
        with:
          level: ${{ inputs.level || 'patch' }}
          aux4_token: ${{ secrets.AUX4_ACCESS_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
